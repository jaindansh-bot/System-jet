<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jet Fighter Combat</title>
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8543049601346570"
 crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #000;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #gameCanvas {
            display: block;
            background-color: #000;
            width: 100%;
            height: 100vh;
        }
        
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
            text-align: center;
            display: none;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }
        
        #startButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #achievement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: gold;
            font-size: 40px;
            text-align: center;
            display: none;
            text-shadow: 0 0 10px #000;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="achievement">
        🏆 CHAMPION! 🥇<br>
        1000 Points!
    </div>
    <div id="gameOver">
        Game Over!<br>
        Score: <span id="finalScore">0</span><br>
        <button id="restartButton">Play Again</button>
    </div>
    <div id="startScreen">
        <h1>Jet Fighter Combat</h1>
        <p>Touch to move, tap to shoot!</p>
        <p>Avoid enemy bullets!</p>
        <button id="startButton">Start Mission</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // Game setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const achievementElement = document.getElementById('achievement');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let score = 0;
        let gameRunning = false;
        let achievementShown = false;
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 60,
            height: 60,
            speed: 8,
            health: 3
        };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let explosions = [];
        let lastEnemySpawn = 0;
        let lastEnemyShot = 0;
        let touchX = player.x;

        // Custom jet fighter graphics
        function drawPlayerJet() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Jet body (blue)
            ctx.fillStyle = '#2196F3';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-15, 15);
            ctx.lineTo(0, 5);
            ctx.lineTo(15, 15);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit (light blue)
            ctx.fillStyle = '#BBDEFB';
            ctx.beginPath();
            ctx.arc(0, -5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Wings (darker blue)
            ctx.fillStyle = '#1976D2';
            ctx.fillRect(-25, 0, 50, 5);
            
            // Draw health indicators
            ctx.fillStyle = 'red';
            for (let i = 0; i < player.health; i++) {
                ctx.fillRect(-20 + (i * 15), -35, 10, 5);
            }
            
            ctx.restore();
        }

        function drawEnemyJet(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Enemy jet body (red)
            ctx.fillStyle = '#F44336';
            ctx.beginPath();
            ctx.moveTo(0, 20);
            ctx.lineTo(-15, -15);
            ctx.lineTo(0, -5);
            ctx.lineTo(15, -15);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit (light red)
            ctx.fillStyle = '#FFCDD2';
            ctx.beginPath();
            ctx.arc(0, 5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Wings (darker red)
            ctx.fillStyle = '#D32F2F';
            ctx.fillRect(-25, -5, 50, 5);
            
            ctx.restore();
        }

        // Explosion class
        class Explosion {
            constructor(x, y, size = 1) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.particles = [];
                
                // Create explosion particles
                for (let i = 0; i < 20 * size; i++) {
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        angle: Math.random() * Math.PI * 2,
                        speed: 1 + Math.random() * 3,
                        radius: 1 + Math.random() * 3,
                        color: `hsl(${Math.random() * 60 + 20}, 100%, 50%)`,
                        life: 30 + Math.random() * 20
                    });
                }
            }
            
            update() {
                this.particles.forEach(p => {
                    p.x += Math.cos(p.angle) * p.speed;
                    p.y += Math.sin(p.angle) * p.speed;
                    p.life--;
                });
                this.particles = this.particles.filter(p => p.life > 0);
                return this.particles.length > 0;
            }
            
            draw() {
                ctx.save();
                this.particles.forEach(p => {
                    const alpha = p.life / 50;
                    ctx.globalAlpha = alpha > 1 ? 1 : alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                ctx.restore();
            }
        }

        // Bullets
        function drawBullets() {
            ctx.fillStyle = '#FFEB3B';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Enemy bullets
        function drawEnemyBullets() {
            ctx.fillStyle = '#FF5252';
            enemyBullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Draw explosions
        function drawExplosions() {
            explosions.forEach(explosion => {
                explosion.draw();
            });
        }

        // Touch movement
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!gameRunning) return;
            const touch = e.touches[0];
            touchX = touch.clientX;
        });

        // Tap to shoot
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameRunning) return;
            shoot();
        });

        // Mouse controls (for testing on desktop)
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            touchX = e.clientX;
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning) return;
            shoot();
        });

        // Shoot a bullet
        function shoot() {
            bullets.push({
                x: player.x,
                y: player.y - 30,
                speed: 15
            });
        }

        // Enemy shoots
        function enemyShoot(x, y) {
            enemyBullets.push({
                x: x,
                y: y + 30,
                speed: 7
            });
        }

        // Spawn an enemy
        function spawnEnemy() {
            enemies.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -60,
                width: 50,
                height: 50,
                speed: 3 + Math.random() * 2,
                shootCooldown: Math.random() * 1000 + 1000
            });
        }

        // Create explosion
        function createExplosion(x, y, size = 1) {
            explosions.push(new Explosion(x, y, size));
        }

        // Show achievement
        function showAchievement() {
            achievementElement.style.display = 'block';
            setTimeout(() => {
                achievementElement.style.display = 'none';
            }, 3000);
        }

        // Update game state
        function update() {
            if (!gameRunning) return;

            // Check for achievement
            if (score >= 1000 && !achievementShown) {
                showAchievement();
                achievementShown = true;
            }

            // Move player to touch position
            player.x += (touchX - player.x) * 0.2;
            player.x = Math.max(30, Math.min(canvas.width - 30, player.x));

            // Move player bullets
            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) {
                    bullets.splice(index, 1);
                }
            });

            // Move enemy bullets
            enemyBullets.forEach((bullet, index) => {
                bullet.y += bullet.speed;
                if (bullet.y > canvas.height) {
                    enemyBullets.splice(index, 1);
                }
            });

            // Spawn enemies
            if (Date.now() - lastEnemySpawn > 800) {
                spawnEnemy();
                lastEnemySpawn = Date.now();
            }

            // Enemy shooting logic
            if (Date.now() - lastEnemyShot > 500 && enemies.length > 0) {
                const shootingEnemy = enemies[Math.floor(Math.random() * enemies.length)];
                enemyShoot(shootingEnemy.x, shootingEnemy.y);
                lastEnemyShot = Date.now();
            }

            // Update explosions
            explosions = explosions.filter(explosion => explosion.update());

            // Move enemies and check collisions
            enemies.forEach((enemy, enemyIndex) => {
                enemy.y += enemy.speed;

                // Remove if off-screen
                if (enemy.y > canvas.height + enemy.height) {
                    enemies.splice(enemyIndex, 1);
                }

                // Check player bullet collisions
                bullets.forEach((bullet, bulletIndex) => {
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 25) { // Hit detection radius
                        createExplosion(enemy.x, enemy.y);
                        enemies.splice(enemyIndex, 1);
                        bullets.splice(bulletIndex, 1);
                        score += 10;
                        scoreElement.textContent = `Score: ${score}`;
                    }
                });
            });

            // Check enemy bullet collisions with player
            enemyBullets.forEach((bullet, index) => {
                const dx = bullet.x - player.x;
                const dy = bullet.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 20) { // Hit detection radius
                    enemyBullets.splice(index, 1);
                    player.health--;
                    createExplosion(bullet.x, bullet.y, 0.5);
                    if (player.health <= 0) {
                        createExplosion(player.x, player.y, 2);
                        gameOver();
                    }
                }
            });

            // Check player collision with enemies
            enemies.forEach(enemy => {
                const playerDx = player.x - enemy.x;
                const playerDy = player.y - enemy.y;
                const playerDistance = Math.sqrt(playerDx * playerDx + playerDy * playerDy);
                
                if (playerDistance < 40) { // Collision radius
                    createExplosion(enemy.x, enemy.y);
                    createExplosion(player.x, player.y, 2);
                    gameOver();
                }
            });
        }

        // Draw everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars (background)
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = (Math.random() * canvas.height + Date.now() / 50) % canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }

            drawPlayerJet();
            enemies.forEach(enemy => drawEnemyJet(enemy.x, enemy.y));
            drawBullets();
            drawEnemyBullets();
            drawExplosions();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        // Start game
        function startGame() {
            score = 0;
            achievementShown = false;
            scoreElement.textContent = `Score: ${score}`;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            explosions = [];
            player.x = canvas.width / 2;
            player.health = 3;
            gameOverElement.style.display = 'none';
            startScreen.style.display = 'none';
            gameRunning = true;
            gameLoop();
        }

        // Event listeners for buttons
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);

        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
        });
    </script>
   
</body>
</html>
